<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coffee Morning &amp; Social Café Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    :root{
      /* Bridge brand palette */
      --brand-teal: #3AABAA;
      --deep-navy: #1D2048;
      --warm-gold: #E8A023;
      --deep-crimson: #8C1A4A;
      --vivid-cobalt: #2B38BF;
      --soft-cream: #F6F1EB;
      --warm-cream: #F2EDE7;
      --white: #FFFFFF;
      --slate: #4A4A5A;
      /* UI tokens */
      --bg: var(--soft-cream);
      --card: var(--white);
      --text: var(--deep-navy);
      --muted: var(--slate);
      --accent: var(--brand-teal);
      --line: rgba(29, 32, 72, .14);
      --line-strong: rgba(29, 32, 72, .22);
      --teal-soft: rgba(58, 171, 170, .14);
      --gold-soft: rgba(232, 160, 35, .18);
      --navy-soft: rgba(29, 32, 72, .08);
      --shadow: 0 18px 42px rgba(29, 32, 72, .14);
      --shadow-soft: 0 10px 24px rgba(29, 32, 72, .08);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }
    .page{
      position: relative;
      isolation: isolate;
      width: 100%;
      max-width: none;
      min-height: 100vh;
      margin: 0;
      padding: 12px clamp(18px, 3vw, 40px) 32px;
      border-radius: 0;
      background:
        radial-gradient(circle at 12% 6%, rgba(232, 160, 35, .22) 0 115px, transparent 116px),
        radial-gradient(circle at 95% 4%, rgba(58, 171, 170, .22) 0 165px, transparent 166px),
        linear-gradient(180deg, #FDFBF8 0%, var(--soft-cream) 100%);
      border: none;
      box-shadow: none;
      overflow: hidden;
    }
    .page::before,
    .page::after{
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      z-index: -1;
    }
    .page::before{
      width: 220px;
      height: 220px;
      right: -82px;
      top: 116px;
      border: 3px solid rgba(58, 171, 170, .24);
    }
    .page::after{
      width: 96px;
      height: 96px;
      left: -36px;
      bottom: 42px;
      border: 2px solid rgba(232, 160, 35, .38);
    }
    /* Desktop: hero + card list in a left column, map filling the rest of
       the screen on the right. Tablet/phone: single column, in the order
       hero -> map -> cards, so people see the map before scrolling through
       every group. Grid areas make the reorder possible without moving the
       actual HTML, so tab/reading order stays sensible at every size. */
    .layout{
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "hero map"
        "cards map";
      gap: 16px 20px;
      height: calc(100vh - 24px);
    }
    .cardsCol{
      grid-area: cards;
      overflow-y: auto;
      padding-right: 6px;
      min-height: 0;
    }
    .mapCol{
      grid-area: map;
      min-height: 0;
    }
    .hero{
      grid-area: hero;
      position: relative;
      overflow: hidden;
      background: var(--brand-teal);
      color: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: clamp(14px, 2vw, 22px) clamp(18px, 3vw, 32px);
    }
    .hero::before,
    .hero::after{
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }
    .hero::before{
      width: 190px;
      height: 190px;
      right: 28px;
      top: -70px;
      border: 3px solid rgba(255,255,255,.36);
    }
    .hero::after{
      width: 118px;
      height: 118px;
      right: 72px;
      top: -34px;
      border: 1.5px solid rgba(255,255,255,.52);
    }
    .heroInner{
      position: relative;
      z-index: 1;
      max-width: 860px;
    }
    .eyebrow{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.35);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .eyebrow::before{
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warm-gold);
      box-shadow: 0 0 0 4px rgba(232, 160, 35, .22);
    }
    h1, h2, h3, .name{
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1{
      margin: 8px 0 0;
      max-width: 22ch;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.02;
      letter-spacing: -.03em;
      font-weight: 800;
      display: block;
    }
    .scriptAccent{
      display: inline;
      margin-left: 8px;
      font-family: "Dancing Script", cursive;
      font-size: clamp(24px, 3.4vw, 36px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      color: var(--warm-gold);
    }
    .intro{
      margin: 8px 0 0;
      max-width: 72ch;
      color: rgba(255,255,255,.9);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 400;
    }
    /* The hero now sits in a fixed ~360-420px sidebar column rather than
       spanning the full page, so the search controls need to stack rather
       than squeeze four fields into one row. Postcode gets its own full-width
       row, radius and type share a row, and Search runs full-width beneath. */
    .controls{
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "postcode postcode"
        "radius category"
        "search search";
      gap: 10px;
      margin-top: 14px;
      padding: 10px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(8px);
    }
    #postcode{ grid-area: postcode; }
    #radius{ grid-area: radius; }
    #categoryFilter{ grid-area: category; }
    #searchBtn{ grid-area: search; }
    input, select, button{
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(255,255,255,.85);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--deep-navy);
      padding: 9px 12px;
      font: inherit;
      font-size: 13px;
      outline: none;
    }
    input::placeholder{ color: rgba(74, 74, 90, .72); }
    input:focus, select:focus{
      border-color: var(--warm-gold);
      box-shadow: 0 0 0 4px rgba(232, 160, 35, .24);
    }
    button{
      background: var(--warm-gold);
      border-color: var(--warm-gold);
      color: var(--deep-navy);
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s ease;
    }
    button:hover{ filter: brightness(1.05); }
    button:disabled{ opacity: .6; cursor: default; }
    .metaRow{
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }
    .meta{
      color: rgba(255,255,255,.82);
      font-size: 13px;
      font-weight: 500;
    }
    .copyLinkBtn{
      width: auto;
      min-height: 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,.55);
      color: var(--white);
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }
    .copyLinkBtn:hover{
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.85);
    }
    .copyLinkBtn.copied{
      background: var(--warm-gold);
      border-color: var(--warm-gold);
      color: var(--deep-navy);
    }
    #map{
      width: 100%;
      height: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      background: var(--navy-soft);
    }
    .leaflet-popup-content-wrapper{
      border-radius: 14px;
      font-family: "Poppins", system-ui, sans-serif;
    }
    .leaflet-popup-content{ font-size: 13px; line-height: 1.5; color: var(--deep-navy); }
    .popupName{ font-weight: 700; font-size: 14px; margin: 0 0 4px; color: var(--deep-navy); }
    .popupMeta{ margin: 0 0 2px; color: var(--slate); }
    .popupLink{ display: inline-block; margin-top: 4px; font-weight: 700; color: var(--brand-teal); text-decoration: none; }
    .popupLink:hover{ text-decoration: underline; }
    .grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 18px;
    }
    .person{
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      backdrop-filter: blur(5px);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .person:hover{
      transform: translateY(-2px);
      border-color: rgba(58, 171, 170, .45);
      box-shadow: 0 16px 34px rgba(29, 32, 72, .14);
    }
    .person.clickable{ cursor: pointer; }
    .person.clickable:focus-visible{
      outline: 3px solid var(--warm-gold);
      outline-offset: 2px;
    }
    .person.selected{
      border-color: var(--brand-teal);
      box-shadow: 0 0 0 3px rgba(58, 171, 170, .3), var(--shadow-soft);
    }
    .personTop{
      padding: 16px 16px 12px;
    }
    .name{
      margin: 0;
      color: var(--deep-navy);
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -.018em;
      font-weight: 700;
    }
    .role{
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 400;
    }
    .distance{
      display: inline-block;
      margin-top: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--deep-navy);
      font-size: 12px;
      font-weight: 700;
    }
    .body{
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }
    .org{
      font-weight: 700;
      font-size: 14px;
      color: var(--brand-teal);
    }
    .bio{
      margin: 0;
      color: var(--slate);
      font-size: 14px;
      line-height: 1.55;
    }
    .chips{
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }
    .chip{
      border: 1px solid rgba(58, 171, 170, .28);
      background: var(--teal-soft);
      color: var(--deep-navy);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .contact{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }
    .contact a{
      text-decoration: none;
      color: var(--deep-navy);
      background: var(--white);
      border: 1px solid var(--line-strong);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }
    .contact a:hover,
    .contact a:focus-visible{
      border-color: var(--brand-teal);
      background: var(--brand-teal);
      color: var(--white);
    }
    .contact a.directions{
      border-color: var(--brand-teal);
      background: var(--teal-soft);
      color: var(--brand-teal);
    }
    .contact a.directions:hover,
    .contact a.directions:focus-visible{
      background: var(--brand-teal);
      color: var(--white);
    }
    .empty, .status{
      text-align: center;
      color: var(--muted);
      padding: 22px;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      margin-top: 18px;
    }
    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
    @media (max-width: 1100px){
      .layout{ grid-template-columns: 360px 1fr; }
    }
    @media (max-width: 900px){
      /* Single column from here down: hero, then map, then the card list -
         so people get their bearings on the map before scrolling through
         every group. */
      .layout{
        display: flex;
        flex-direction: column;
        height: auto;
        gap: 14px;
      }
      .cardsCol{ order: 3; overflow-y: visible; padding-right: 0; }
      .mapCol{ order: 2; height: 420px; }
      .hero{ order: 1; }
      .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1{ max-width: 100%; }
    }
    @media (max-width: 560px){
      .page{
        padding: 12px 12px 32px;
      }
      .hero{
        padding: 22px 18px;
        border-radius: 22px;
      }
      .metaRow{ flex-direction: column; align-items: stretch; }
      .copyLinkBtn{ width: 100%; }
      .controls{
        grid-template-columns: 1fr;
        grid-template-areas:
          "postcode"
          "radius"
          "category"
          "search";
      }
      .grid{ grid-template-columns: 1fr; }
      .mapCol{ height: 300px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <section class="hero">
        <div class="heroInner">
          <div class="eyebrow">Lincoln North Rural</div>
          <h1>Find a coffee morning <span class="scriptAccent">near you</span></h1>
          <p class="intro">
            A directory of coffee mornings, luncheon clubs and friendship groups across Lincoln North Rural.
            Enter a postcode and a distance to see what's nearby, or browse everything below.
          </p>
        </div>
        <div class="controls">
          <input id="postcode" type="text" placeholder="Enter a postcode, e.g. LN2 2LB" aria-label="Postcode" autocomplete="off" />
          <select id="radius" aria-label="Search radius">
            <option value="1">Within 1 mile</option>
            <option value="3" selected>Within 3 miles</option>
            <option value="5">Within 5 miles</option>
            <option value="10">Within 10 miles</option>
            <option value="20">Within 20 miles</option>
          </select>
          <select id="categoryFilter" aria-label="Filter by type">
            <option value="">All types</option>
          </select>
          <button id="searchBtn" type="button">Search</button>
        </div>
        <div class="metaRow">
          <div id="meta" class="meta">Loading directory...</div>
          <button id="copyLinkBtn" class="copyLinkBtn" type="button">Copy link to this view</button>
        </div>
      </section>
      <div class="mapCol">
        <div id="map"></div>
      </div>
      <div class="cardsCol">
        <section id="directory" class="grid" aria-label="Coffee morning directory"></section>
        <div id="status" class="status" hidden></div>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // ---- Configuration: update these two values for your sheet ----
    const SHEET_ID = "1SaA33FZUbDLtIdV2_5clrDggOHYaFYzALbRcVXplp2E";
    // Tab name inside the Google Sheet. Must match the "Map Data (Confirmed)" tab exactly,
    // or whatever you rename it to once it's a live Google Sheet (not the .xlsx file).
    const SHEET_NAME = "Sheet1";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    // Default map view: centred roughly on Lincoln North Rural, zoomed out to show all clusters.
    const DEFAULT_CENTER = [53.29, -0.55];
    const DEFAULT_ZOOM = 11;
    const directoryEl = document.getElementById("directory");
    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const postcodeEl = document.getElementById("postcode");
    const radiusEl = document.getElementById("radius");
    const categoryFilterEl = document.getElementById("categoryFilter");
    const searchBtn = document.getElementById("searchBtn");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    let groups = [];
    let searchOrigin = null; // { lat, lng } of the searched postcode, or null
    // ---- Shareable URL support ----
    // Reads/writes ?postcode=...&radius=...&category=... so a specific filtered
    // view can be copied and sent as a link. Works when this page is opened
    // directly (e.g. a hosted URL); a Google Sites Embed loads this in an
    // iframe, so the browser's own address bar won't reflect it there - the
    // Copy Link button always builds the link from this page's own URL, which
    // is what you'd share instead of the Sites page link.
    function paramsFromControls(){
      const params = new URLSearchParams();
      const pc = postcodeEl.value.trim();
      if (pc) params.set("postcode", pc);
      if (radiusEl.value) params.set("radius", radiusEl.value);
      if (categoryFilterEl.value) params.set("category", categoryFilterEl.value);
      return params;
    }
    function updateUrl(){
      const query = paramsFromControls().toString();
      const newUrl = `${window.location.pathname}${query ? "?" + query : ""}${window.location.hash}`;
      window.history.replaceState({}, "", newUrl);
    }
    function applyParamsFromUrl(){
      const params = new URLSearchParams(window.location.search);
      const pc = params.get("postcode");
      const radius = params.get("radius");
      const category = params.get("category");
      if (pc) postcodeEl.value = pc;
      if (radius && [...radiusEl.options].some(o => o.value === radius)){
        radiusEl.value = radius;
      }
      if (category && [...categoryFilterEl.options].some(o => o.value === category)){
        categoryFilterEl.value = category;
      }
      return Boolean(pc);
    }
    async function copyShareLink(){
      updateUrl();
      const link = window.location.href;
      const showCopied = () => {
        copyLinkBtn.textContent = "Link copied!";
        copyLinkBtn.classList.add("copied");
        setTimeout(() => {
          copyLinkBtn.textContent = "Copy link to this view";
          copyLinkBtn.classList.remove("copied");
        }, 2000);
      };
      try{
        await navigator.clipboard.writeText(link);
        showCopied();
      } catch {
        // Clipboard API can be blocked inside an iframe - fall back to a
        // temporary text field and the older copy command.
        const temp = document.createElement("input");
        temp.value = link;
        document.body.appendChild(temp);
        temp.select();
        try{ document.execCommand("copy"); showCopied(); }
        catch { window.prompt("Copy this link:", link); }
        document.body.removeChild(temp);
      }
    }
    const map = L.map("map", { scrollWheelZoom: false }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18
    }).addTo(map);
    let markerLayer = L.layerGroup().addTo(map);
    let searchMarker = null;
    let markerByShopKey = new Map();
    let selectedCard = null;
    // Stable-enough identity for a group row so a card can find its marker.
    function shopKey(g){
      return [g.name, g.address, g.village].join("|");
    }
    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++){
        const c = text[i];
        const next = text[i + 1];
        if (c === '"'){
          if (inQuotes && next === '"'){
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }
        if (!inQuotes && c === ","){
          row.push(cell);
          cell = "";
          continue;
        }
        if (!inQuotes && (c === "\n" || c === "\r")){
          if (c === "\r" && next === "\n") i++;
          row.push(cell);
          cell = "";
          if (row.some(value => value.trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cell += c;
      }
      row.push(cell);
      if (row.some(value => value.trim() !== "")) rows.push(row);
      return rows;
    }
    function normalise(value){
      return String(value || "").trim();
    }
    function safeUrl(url){
      const value = normalise(url);
      if (!value) return "";
      const withScheme = /^https?:\/\//i.test(value) ? value : `https://${value}`;
      try{
        const u = new URL(withScheme);
        if (u.protocol === "http:" || u.protocol === "https:") return withScheme;
      } catch {}
      return "";
    }
    function mailto(email){
      const value = normalise(email);
      if (!value || !value.includes("@")) return "";
      return `mailto:${value}`;
    }
    function tel(phone){
      const value = normalise(phone);
      if (!value) return "";
      return `tel:${value.replace(/[^0-9+]/g, "")}`;
    }
    // Google Maps directions link. Uses lat/lng from the sheet as the
    // destination (most reliable); falls back to the address text if no
    // coordinates are present.
    function directionsUrl(g){
      const lat = Number(g.latitude);
      const lng = Number(g.longitude);
      if (Number.isFinite(lat) && Number.isFinite(lng)){
        return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
      }
      const addr = [g.address, g.village, "Lincolnshire, UK"].filter(Boolean).join(", ");
      if (!addr) return "";
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}`;
    }
    function escapeHtml(value){
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function makeObjectRows(rows){
      if (!rows.length) return [];
      const headers = rows[0].map(h => normalise(h));
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = normalise(row[index]);
        });
        return obj;
      });
    }
    // Haversine distance in miles between two lat/lng points.
    function milesBetween(lat1, lon1, lat2, lon2){
      const R = 3958.8; // Earth radius in miles
      const toRad = deg => (deg * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }
    async function geocodePostcode(postcode){
      const clean = normalise(postcode).replace(/\s+/g, "");
      if (!clean) return null;
      const res = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(clean)}`);
      if (!res.ok) return null;
      const json = await res.json();
      if (json.status !== 200 || !json.result) return null;
      return { lat: json.result.latitude, lng: json.result.longitude };
    }
    function populateFilters(data){
      categoryFilterEl.length = 1;
      const categories = [...new Set(data.map(g => g.category).filter(Boolean))].sort();
      for (const category of categories){
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categoryFilterEl.appendChild(option);
      }
    }
    function withDistance(list){
      if (!searchOrigin) return list.map(g => ({ ...g, _distance: null }));
      return list.map(g => {
        const lat = Number(g.latitude);
        const lng = Number(g.longitude);
        const distance = Number.isFinite(lat) && Number.isFinite(lng)
          ? milesBetween(searchOrigin.lat, searchOrigin.lng, lat, lng)
          : null;
        return { ...g, _distance: distance };
      });
    }
    function render(){
      const category = categoryFilterEl.value;
      const radius = Number(radiusEl.value);
      let list = withDistance(groups);
      list = list.filter(g => !category || g.category === category);
      if (searchOrigin){
        list = list.filter(g => g._distance !== null && g._distance <= radius);
        list.sort((a, b) => a._distance - b._distance);
      } else {
        list.sort((a, b) => normalise(a.name).localeCompare(normalise(b.name)));
      }
      // Map markers
      markerLayer.clearLayers();
      markerByShopKey = new Map();
      selectedCard = null;
      const bounds = [];
      for (const g of list){
        const lat = Number(g.latitude);
        const lng = Number(g.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
        const dirLink = directionsUrl(g);
        const popupHtml = `
          <p class="popupName">${escapeHtml(g.name)}</p>
          <p class="popupMeta">${escapeHtml([g.day, g.time].filter(Boolean).join(" · "))}</p>
          <p class="popupMeta">${escapeHtml(g.address)}</p>
          ${dirLink ? `<a class="popupLink" href="${escapeHtml(dirLink)}" target="_blank" rel="noopener">Get directions &rarr;</a>` : ""}
        `;
        const marker = L.marker([lat, lng]).bindPopup(popupHtml).addTo(markerLayer);
        markerByShopKey.set(shopKey(g), marker);
        bounds.push([lat, lng]);
      }
      if (searchOrigin){
        if (searchMarker) map.removeLayer(searchMarker);
        searchMarker = L.circleMarker([searchOrigin.lat, searchOrigin.lng], {
          radius: 8, color: "#E8A023", fillColor: "#E8A023", fillOpacity: 1, weight: 2
        }).addTo(map).bindPopup("Your search postcode");
        bounds.push([searchOrigin.lat, searchOrigin.lng]);
      }
      if (bounds.length){
        map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
      } else {
        map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
      }
      // Cards
      directoryEl.innerHTML = "";
      if (!list.length){
        directoryEl.innerHTML = `<div class="empty">No groups match those filters. Try a wider radius, or clear the postcode to browse everything.</div>`;
        metaEl.textContent = `Showing 0 of ${groups.length} groups`;
        return;
      }
      for (const g of list){
        const contactLinks = [];
        const emailHref = mailto(g.email);
        if (emailHref) contactLinks.push(`<a href="${escapeHtml(emailHref)}">Email</a>`);
        const phoneHref = tel(g.phone);
        if (phoneHref) contactLinks.push(`<a href="${escapeHtml(phoneHref)}">Phone</a>`);
        const website = safeUrl(g.website);
        if (website) contactLinks.push(`<a href="${escapeHtml(website)}" target="_blank" rel="noopener">Website</a>`);
        const dirLink = directionsUrl(g);
        if (dirLink) contactLinks.push(`<a class="directions" href="${escapeHtml(dirLink)}" target="_blank" rel="noopener">Directions</a>`);
        const detailLine = [g.day, g.time].filter(Boolean).join(" · ");
        const distanceHtml = g._distance !== null
          ? `<span class="distance">${g._distance.toFixed(1)} miles away</span>`
          : "";

        const lat = Number(g.latitude);
        const lng = Number(g.longitude);
        const hasLocation = Number.isFinite(lat) && Number.isFinite(lng);

        const card = document.createElement("article");
        card.className = "person";
        if (hasLocation){
          card.classList.add("clickable");
          card.tabIndex = 0;
          card.setAttribute("role", "button");
          card.setAttribute("aria-label", `Centre the map on ${g.name}`);
        }
        card.innerHTML = `
          <div class="personTop">
            <h2 class="name">${escapeHtml(g.name)}</h2>
            ${detailLine ? `<p class="role">${escapeHtml(detailLine)}</p>` : ""}
            ${distanceHtml}
          </div>
          <div class="body">
            <div>
              ${g.village ? `<div class="org">${escapeHtml(g.village)}</div>` : ""}
              ${g.address ? `<p class="bio">${escapeHtml(g.address)}</p>` : ""}
            </div>
            ${g.cost ? `<div class="chips"><span class="chip">${escapeHtml(g.cost)}</span>${g.category ? `<span class="chip">${escapeHtml(g.category)}</span>` : ""}</div>` : (g.category ? `<div class="chips"><span class="chip">${escapeHtml(g.category)}</span></div>` : "")}
            ${contactLinks.length ? `<div class="contact">${contactLinks.join("")}</div>` : ""}
          </div>
        `;

        if (hasLocation){
          const focusShop = () => {
            map.setView([lat, lng], 15);
            const marker = markerByShopKey.get(shopKey(g));
            if (marker) marker.openPopup();
            if (selectedCard) selectedCard.classList.remove("selected");
            card.classList.add("selected");
            selectedCard = card;
            // On tablet/phone the map sits above the card list, so bring it
            // back into view; on desktop it's already visible in the sticky
            // column, so this is a no-op there.
            document.querySelector(".mapCol")?.scrollIntoView({ behavior: "smooth", block: "center" });
          };
          card.addEventListener("click", (e) => {
            if (e.target.closest("a")) return; // let contact/direction links behave normally
            focusShop();
          });
          card.addEventListener("keydown", (e) => {
            if (e.target.closest("a")) return;
            if (e.key === "Enter" || e.key === " "){
              e.preventDefault();
              focusShop();
            }
          });
        }

        directoryEl.appendChild(card);
      }
      metaEl.textContent = searchOrigin
        ? `Showing ${list.length} of ${groups.length} groups within ${radius} miles`
        : `Showing all ${list.length} groups`;
    }
    async function runSearch(){
      const postcode = postcodeEl.value.trim();
      if (!postcode){
        searchOrigin = null;
        render();
        return;
      }
      searchBtn.disabled = true;
      searchBtn.textContent = "Searching...";
      statusEl.hidden = true;
      try{
        const point = await geocodePostcode(postcode);
        if (!point){
          statusEl.hidden = false;
          statusEl.textContent = "Couldn't find that postcode. Check it's a valid UK postcode and try again.";
          searchOrigin = null;
        } else {
          searchOrigin = point;
        }
        render();
        updateUrl();
      } catch (err){
        console.error(err);
        statusEl.hidden = false;
        statusEl.textContent = "Something went wrong looking up that postcode. Please try again.";
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "Search";
      }
    }
    async function loadDirectory(){
      try{
        const res = await fetch(CSV_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
        const csv = await res.text();
        const rows = parseCSV(csv);
        groups = makeObjectRows(rows);
        populateFilters(groups);
        // Pre-fill from a shared link (?postcode=...&radius=...&category=...).
        // Category/radius need the <select> options to exist first, hence this
        // runs after populateFilters(). If a postcode was in the link, run the
        // search automatically so the recipient sees the same filtered view.
        const hasPostcode = applyParamsFromUrl();
        if (hasPostcode){
          await runSearch();
        } else {
          render();
        }
      } catch (err){
        console.error(err);
        metaEl.textContent = "Could not load the directory.";
        statusEl.hidden = false;
        statusEl.textContent = "Check that the Google Sheet is published to the web, the Sheet ID is correct, and the tab name is exactly right.";
      }
    }
    searchBtn.addEventListener("click", runSearch);
    postcodeEl.addEventListener("keydown", (e) => { if (e.key === "Enter") runSearch(); });
    radiusEl.addEventListener("change", () => { render(); updateUrl(); });
    categoryFilterEl.addEventListener("change", () => { render(); updateUrl(); });
    copyLinkBtn.addEventListener("click", copyShareLink);
    loadDirectory();
  </script>
</body>
</html>
